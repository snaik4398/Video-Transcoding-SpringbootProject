# Docker profile specific configuration
# These properties override application.properties when SPRING_PROFILES_ACTIVE=docker

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:transcode_db}
spring.datasource.username=${POSTGRES_USER:transcode_user}
spring.datasource.password=${POSTGRES_PASSWORD:secure_password_123}

