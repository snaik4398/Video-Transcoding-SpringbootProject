server.port=8082

spring.application.name=transcoding-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:transcode_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Redis (Spring Boot 3.x uses spring.data.redis.*)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis_password_123}
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-wait=-1ms
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:transcode-service-group}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# FFmpeg
transcoding.ffmpeg.path=${FFMPEG_PATH:/usr/bin/ffmpeg}
transcoding.ffmpeg.probe-path=${FFPROBE_PATH:/usr/bin/ffprobe}

# Processing
transcoding.processing.max-concurrent-jobs=${MAX_CONCURRENT_JOBS:4}
transcoding.processing.temp-directory=${TEMP_DIR:/tmp/transcode}
transcoding.processing.output-directory=${OUTPUT_DIR:/app/output}
transcoding.processing.cleanup-temp-files=true

# GPU (type: none, nvidia, intel)
transcoding.gpu.enabled=${ENABLE_GPU_ACCELERATION:false}
transcoding.gpu.type=${GPU_TYPE:none}
transcoding.gpu.cuda-devices=${CUDA_VISIBLE_DEVICES:0}
transcoding.gpu.render-device=${RENDER_DEVICE:/dev/dri/renderD128}

# Defaults
transcoding.defaults.video-codec=libx264
transcoding.defaults.audio-codec=aac
transcoding.defaults.output-format=mp4
transcoding.defaults.video-bitrate=1500k
transcoding.defaults.audio-bitrate=128k
transcoding.defaults.frame-rate=30
transcoding.defaults.resolution=1280x720

# MinIO
storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
storage.minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
storage.minio.bucket-name=${MINIO_BUCKET_NAME:video-files}
storage.minio.output-bucket-name=${MINIO_OUTPUT_BUCKET:transcoded-files}

# Security toggle (set SECURITY_ENABLED=false to disable JWT auth for testing)
security.enabled=${SECURITY_ENABLED:true}

# JWT
jwt.secret=${JWT_SECRET:Sanjay}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.sanjay=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
